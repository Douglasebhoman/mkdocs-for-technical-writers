site_name: MkDocs for Technical Writers
site_url: https://douglasebhoman.com/mkdocs-for-technical-writers/
site_author: Douglas Ebhoman
site_description: A complete guide to MkDocs for technical writers. Covers installation, configuration, GitHub Pages deployment, custom domains, and troubleshooting. Written for Docs-as-Code workflows.

repo_name: Douglasebhoman/mkdocs-for-technical-writers
repo_url: https://github.com/Douglasebhoman/mkdocs-for-technical-writers

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: false
    code: false
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github
  social_image: assets/images/mkdocs-for-technical-writers-card.png

extra_css:
  - stylesheets/brand.css

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Writing Content: writing-content.md
  - Deployment: deployment.md
  - Custom Domain: custom-domain.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true

extra:
  meta:
    - name: og:type
      content: website
    - name: og:title
      content: MkDocs for Technical Writers
    - name: og:description
      content: A complete guide to MkDocs for technical writers. Covers installation, configuration, GitHub Pages deployment, custom domains, and troubleshooting.
    - name: og:image
      content: https://douglasebhoman.com/mkdocs-for-technical-writers/assets/images/mkdocs-for-technical-writers-card.png
    - name: twitter:card
      content: summary_large_image
    - name: twitter:title
      content: MkDocs for Technical Writers
    - name: twitter:description
      content: A complete guide to MkDocs for technical writers. Covers installation, configuration, GitHub Pages deployment, custom domains, and troubleshooting.
    - name: twitter:image
      content: https://douglasebhoman.com/mkdocs-for-technical-writers/assets/images/mkdocs-for-technical-writers-card.png
  social:
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/douglas-ebhoman-757329289
    - icon: fontawesome/brands/github
      link: https://github.com/Douglasebhoman
    - icon: fontawesome/solid/globe
      link: https://douglasebhoman.com

copyright: '© 2026 Douglas Ebhoman · <a href="https://douglasebhoman.com">douglasebhoman.com</a>'